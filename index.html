<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snapmaker RFID Tag Writer</title>

  <!-- WebNFC explizit erlauben -->
  <meta http-equiv="Permissions-Policy" content="nfc=(self)">

  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      margin: 0;
      padding: 1rem;
    }
    h1 {
      text-align: center;
      margin-bottom: 1rem;
    }
    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 1rem;
      max-width: 760px;
      margin: auto;
    }
    label {
      display: block;
      margin-top: 1rem;
    }
    select, input, button {
      width: 100%;
      padding: 0.6rem;
      margin-top: 0.4rem;
      font-size: 1rem;
    }
    button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 1rem;
    }
    pre {
      background: #020617;
      padding: 0.75rem;
      border-radius: 8px;
      margin-top: 1rem;
      font-size: 0.85rem;
      overflow-x: auto;
    }
    .status {
      margin-top: 1rem;
      padding: 0.75rem;
      background: #020617;
      border-radius: 8px;
    }
    .color-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 0.5rem;
    }
    .color-preview {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid #555;
    }
  </style>
</head>

<body>

<h1>Snapmaker RFID Writer</h1>

<div class="card">

  <label for="filamentSelect">Filament auswählen</label>
  <select id="filamentSelect"></select>

  <label for="colorPicker">Farbe anpassen</label>
  <input type="color" id="colorPicker">

  <div class="color-row">
    <div id="colorPreview" class="color-preview"></div>
    <code id="colorHexPreview"></code>
  </div>

  <label for="rollCount">Wie viele Rollen dieses Filaments?</label>
  <input type="number" id="rollCount" min="1" value="1" />

  <div class="status" id="status">Bereit.</div>

  <pre id="jsonPreview"></pre>

  <button onclick="writeTag()">Tag jetzt schreiben</button>
</div>

<script>
/* ===========================
   FILAMENT-VORLAGEN
   =========================== */
const filaments = [
  { name:"Geeetech PLA Weiß", json:{protocol:"openspool",version:"1.0",brand:"Geeetech",type:"PLA",color_hex:"#FFFFFF",min_temp:185,max_temp:215,bed_min_temp:25,bed_max_temp:60}},
  { name:"PLA+ Weiß", json:{protocol:"openspool",version:"1.0",brand:"Generic",type:"PLA+",color_hex:"#FFFFFF",min_temp:190,max_temp:220,bed_min_temp:50,bed_max_temp:60}},
  { name:"PLA+ Schwarz", json:{protocol:"openspool",version:"1.0",brand:"Generic",type:"PLA+",color_hex:"#000000",min_temp:190,max_temp:220,bed_min_temp:50,bed_max_temp:60}},
  { name:"Ender PLA Weiß", json:{protocol:"openspool",version:"1.0",brand:"Creality",type:"PLA",color_hex:"#FFFFFF",min_temp:190,max_temp:230,bed_min_temp:50,bed_max_temp:50}},
  { name:"Geeetech PLA Rot", json:{protocol:"openspool",version:"1.0",brand:"Geeetech",type:"PLA",color_hex:"#FF0000",min_temp:185,max_temp:215,bed_min_temp:25,bed_max_temp:60}},
  { name:"3DKaige PLA+ Grün", json:{protocol:"openspool",version:"1.0",brand:"3DKaige",type:"PLA+",color_hex:"#00983A",min_temp:210,max_temp:230,bed_min_temp:45,bed_max_temp:60}},
  { name:"eSun PLA Basic Grau", json:{protocol:"openspool",version:"1.0",brand:"eSun",type:"PLA",color_hex:"#808080",min_temp:210,max_temp:230,bed_min_temp:45,bed_max_temp:60}},
  { name:"eSun PLA+ Hellbraun", json:{protocol:"openspool",version:"1.0",brand:"eSun",type:"PLA+",color_hex:"#A27557",min_temp:205,max_temp:225,bed_min_temp:60,bed_max_temp:80}},
  { name:"Timorry PETG Weiß", json:{protocol:"openspool",version:"1.0",brand:"Timorry",type:"PETG",color_hex:"#FFFFFF",min_temp:240,max_temp:270,bed_min_temp:65,bed_max_temp:75}},
  { name:"PETG Gelb A12089", json:{protocol:"openspool",version:"1.0",brand:"Generic",type:"PETG",color_hex:"#FFFF00",min_temp:230,max_temp:250,bed_min_temp:70,bed_max_temp:85}},
  { name:"Jlob PETG Schwarz", json:{protocol:"openspool",version:"1.0",brand:"Jlob",type:"PETG",color_hex:"#000000",min_temp:190,max_temp:230,bed_min_temp:70,bed_max_temp:85}},
  { name:"Amazon Basics PETG Blau", json:{protocol:"openspool",version:"1.0",brand:"Amazon Basics",type:"PETG",color_hex:"#0443BA",min_temp:230,max_temp:240,bed_min_temp:80,bed_max_temp:80}},
  { name:"Amazon Basics PETG Orange", json:{protocol:"openspool",version:"1.0",brand:"Amazon Basics",type:"PETG",color_hex:"#E97435",min_temp:230,max_temp:240,bed_min_temp:80,bed_max_temp:80}},
  { name:"Rankforce PP", json:{protocol:"openspool",version:"1.0",brand:"Rankforce",type:"PP",color_hex:"#FFFFFF",min_temp:230,max_temp:250,bed_min_temp:90,bed_max_temp:110}},
  { name:"Creality Hyper PC", json:{protocol:"openspool",version:"1.0",brand:"Creality",type:"PC",color_hex:"#CCCCCC",min_temp:240,max_temp:260,bed_min_temp:50,bed_max_temp:80}},
  { name:"TPU 58 Shore Blau", json:{protocol:"openspool",version:"1.0",brand:"Generic",type:"TPU",color_hex:"#004A9F",min_temp:230,max_temp:260,bed_min_temp:50,bed_max_temp:60}},
  { name:"TPU 58 Shore Transparent", json:{protocol:"openspool",version:"1.0",brand:"Generic",type:"TPU",color_hex:"#FFFFFF",min_temp:230,max_temp:260,bed_min_temp:50,bed_max_temp:60}},
  { name:"eSun PLA Basic Orange", json:{protocol:"openspool",version:"1.0",brand:"eSun",type:"PLA",color_hex:"#FF8C00",min_temp:210,max_temp:230,bed_min_temp:45,bed_max_temp:60}},
  { name:"DEEPLEE PLA+ Weiß", json:{"protocol":"openspool","version":"1.0","brand":"Deeplee","type":"PLA+","color_hex":"#FFFFFF","min_temp":200,"max_temp":230,"bed_min_temp":50,"bed_max_temp":60}}
];

/* ===========================
   STATE
   =========================== */
let activeFilament = null;
let side = "Vorderseite";
let rollIndex = 1;

/* ===========================
   UI INIT
   =========================== */
const select = document.getElementById("filamentSelect");
const colorPicker = document.getElementById("colorPicker");
const preview = document.getElementById("jsonPreview");
const status = document.getElementById("status");

filaments.forEach((f, i) => {
  const o = document.createElement("option");
  o.value = i;
  o.textContent = f.name;
  select.appendChild(o);
});

function loadSelectedFilament() {
  const original = filaments[select.value];
  activeFilament = JSON.parse(JSON.stringify(original.json));
  colorPicker.value = activeFilament.color_hex;
  updateColorUI();
  updateJsonPreview();
}

function updateColorUI() {
  document.getElementById("colorPreview").style.background =
    activeFilament.color_hex;
  document.getElementById("colorHexPreview").textContent =
    activeFilament.color_hex;
}

function updateJsonPreview() {
  preview.textContent = JSON.stringify(activeFilament, null, 2);
}

select.onchange = () => {
  side = "Vorderseite";
  rollIndex = 1;
  loadSelectedFilament();
};

colorPicker.addEventListener("input", () => {
  activeFilament.color_hex = colorPicker.value.toUpperCase();
  updateColorUI();
  updateJsonPreview();
});

loadSelectedFilament();

/* ===========================
   WEBNFC WRITE
   =========================== */
async function writeTag() {
  if (!("NDEFReader" in window)) {
    alert("❌ WebNFC wird von diesem Browser nicht unterstützt");
    return;
  }

  const total = parseInt(document.getElementById("rollCount").value, 10);

  try {
    const encoder = new TextEncoder();
    const payload = encoder.encode(JSON.stringify(activeFilament));

    const ndef = new NDEFReader();
    await ndef.write({
      records: [{
        recordType: "mime",
        mediaType: "application/json",
        data: payload
      }]
    });

    status.textContent =
      `✅ ${filaments[select.value].name} – Rolle ${rollIndex}/${total} – ${side} geschrieben`;

    if (side === "Vorderseite") {
      side = "Rückseite";
    } else {
      side = "Vorderseite";
      rollIndex++;
      if (rollIndex > total) {
        status.textContent =
          `🎉 Alle Rollen von ${filaments[select.value].name} fertig programmiert`;
        rollIndex = 1;
      }
    }
  } catch (err) {
    alert("❌ Fehler beim Schreiben: " + err);
  }
}
</script>

</body>
</html>
